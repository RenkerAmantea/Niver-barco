kind = "web"
previewPath = "/"
title = "Renker Niver de Bolso"
version = "1.0.0"
id = "artifacts/niver"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24128

[services.development]
run = "pnpm --filter @workspace/niver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/niver", "run", "build" ]
serve = "static"
publicDir = "artifacts/niver/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24128"
BASE_PATH = "/"
